<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>세아제강 경조사 대시보드</title>
<meta name="description" content="세아제강 임직원 경조사 정보 및 계좌번호 원클릭 복사">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="경조사">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --border: #dde1e7;
  --text: #1c1e21;
  --sub: #65676b;
  --red: #c0392b;
  --blue: #1877f2;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg); color: var(--text); }

/* ── 헤더 ── */
.hdr {
  background: #1a1a2e;
  color: #fff;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,.4);
}
.hdr-l { display: flex; align-items: center; gap: 12px; }
.logo { background: var(--red); font-weight: 900; font-size: 14px;
        padding: 4px 9px; border-radius: 5px; letter-spacing: -.5px; }
.hdr-title { font-size: 17px; font-weight: 700; }
.hdr-r { display: flex; align-items: center; gap: 10px; font-size: 12px; color: rgba(255,255,255,.6); }
.ts { text-align: right; line-height: 1.5; }

/* ── 새로고침 버튼 ── */
.btn-ref {
  background: rgba(255,255,255,.15);
  border: 1px solid rgba(255,255,255,.3);
  color: #fff;
  padding: 6px 14px; border-radius: 6px;
  font-size: 13px; cursor: pointer; font-family: inherit;
  display: flex; align-items: center; gap: 5px;
  transition: background .2s;
}
.btn-ref:hover { background: rgba(255,255,255,.25); }

/* ── 통계 바 ── */
.stats {
  max-width: 900px; margin: 20px auto 12px;
  padding: 0 16px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.chip {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 4px 14px; font-size: 13px;
  display: flex; align-items: center; gap: 6px;
}
.dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.chip b { font-weight: 700; }
.filters { margin-left: auto; display: flex; gap: 6px; }
.fb {
  padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card);
  font-size: 12px; cursor: pointer; font-family: inherit;
  transition: all .15s;
}
.fb.on { background: var(--red); color: #fff; border-color: var(--red); }

/* ── 카드 목록 ── */
.list { max-width: 900px; margin: 0 auto 32px; padding: 0 16px;
        display: flex; flex-direction: column; gap: 10px; }

.card {
  background: var(--card);
  border-radius: 10px;
  border-left: 4px solid #ccc;
  box-shadow: 0 1px 4px rgba(0,0,0,.07);
  padding: 14px 18px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
}
.card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.13); }
.card.funeral { border-left-color: #444; background: #f8f9fa; }
.card.wedding { border-left-color: #e83e5a; background: #fff5f7; }
.card.birth   { border-left-color: #0075ca; background: #f0f7ff; }
.card.other   { border-left-color: #d4a017; background: #fffbf0; }

.tag {
  display: inline-block;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 4px;
  margin-right: 6px; flex-shrink: 0;
}
.funeral .tag { background: #444; color: #fff; }
.wedding .tag { background: #e83e5a; color: #fff; }
.birth   .tag { background: #0075ca; color: #fff; }
.other   .tag { background: #d4a017; color: #fff; }

.title { font-size: 14px; font-weight: 600; line-height: 1.4; }
.meta  { margin-top: 5px; font-size: 11px; color: var(--sub); display: flex; gap: 14px; }

/* ── 계좌 박스 ── */
.acc-box {
  background: rgba(0,0,0,.03);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  min-width: 220px;
  text-align: center;
}
.acc-lbl { font-size: 10px; color: var(--sub); font-weight: 700; letter-spacing: .5px; margin-bottom: 3px; }
.acc-who { font-size: 12px; font-weight: 600; color: var(--sub); margin-bottom: 2px; }
.acc-num { font-size: 16px; font-weight: 800; font-family: 'Courier New', monospace;
           letter-spacing: 1.5px; margin-bottom: 8px; color: var(--text); }
.btn-copy {
  width: 100%; padding: 7px 0;
  background: var(--blue); color: #fff;
  border: none; border-radius: 6px;
  font-size: 12px; font-weight: 700;
  cursor: pointer; font-family: inherit;
  transition: background .2s;
}
.btn-copy:hover  { background: #166fe5; }
.btn-copy.ok     { background: #28a745; }
.no-acc { font-size: 12px; color: var(--sub); padding: 10px 8px; }

.seah-link { font-size: 11px; color: var(--blue); text-decoration: none; display: block; margin-top: 6px; }
.seah-link:hover { text-decoration: underline; }

/* ── 빈 상태 / 안내 ── */
.empty { text-align: center; padding: 60px 20px; color: var(--sub); }
.empty .ico { font-size: 44px; margin-bottom: 10px; }
.empty h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
.empty p  { font-size: 13px; line-height: 1.7; }

/* ── 반응형 ── */
@media(max-width:640px){
  .card { grid-template-columns: 1fr; }
  .acc-box { min-width: unset; }
  .filters { margin-left: 0; }
}
</style>
</head>

<script>
const BASE = 'https://seahworks.seah.co.kr';
const BOARD = 'BD_220404HR5G94';
const DETAIL = id => `${BASE}/board/data/view/${BOARD}/${id}`;

function classifyType(title='') {
  if (/부고|별세|상$|빙부|빙모|모친|부친|조부|조모|외조|형제|자부|처부|처모/.test(title)) return 'funeral';
  if (/결혼|혼인|♥|♡|축 결혼/.test(title)) return 'wedding';
  if (/출산|탄생|득남|득녀|🧡|👶/.test(title)) return 'birth';
  return 'other';
}
const typeLabel = {funeral:'부 고', wedding:'결 혼', birth:'출 산', other:'기타'};
const typeClass = {funeral:'funeral', wedding:'wedding', birth:'birth', other:'other'};

let _all = [], _filter = 'all';

function render(items) {
  const list = document.getElementById('cardList');
  if (!items.length) {
    list.innerHTML = `<div class="empty"><div class="ico">📋</div><h3>해당 항목이 없습니다</h3></div>`;
    return;
  }
  list.innerHTML = items.map(cardHTML).join('');
}

function cardHTML(it) {
  const tc = typeClass[it.type] || 'other';
  const tl = typeLabel[it.type] || '기타';
  const hasAcc = it.accountNum;
  const noAccMsg = it.type === 'birth' ? '🍼 출산 경조금은 복리후생팀에서 직접 처리' : '계좌정보 없음 — 세아웍스 원문 확인';
  const accSection = hasAcc
    ? `<div class="acc-box"><div class="acc-lbl">💰 계좌정보</div><div class="acc-who">${it.holder} · ${it.bank}</div><div class="acc-num">${it.accountNum}</div><button class="btn-copy" onclick="doCopy('${it.accountNum}','${it.holder}(${it.bank})',this)">📋 계좌번호 복사</button><a class="seah-link" href="${DETAIL(it.id)}" target="_blank">세아웍스에서 보기 →</a></div>`
    : `<div class="acc-box"><div class="no-acc">${noAccMsg}</div><a class="seah-link" href="${DETAIL(it.id)}" target="_blank">세아웍스에서 보기 →</a></div>`;
  return `<div class="card ${tc}"><div><div style="display:flex;align-items:flex-start;gap:4px;flex-wrap:wrap;margin-bottom:6px"><span class="tag">${tl}</span><span class="title">${it.title}</span></div><div class="meta"><span>📅 ${it.date||'—'}</span><span>✍️ ${it.author||'—'}</span></div></div>${accSection}</div>`;
}

function doCopy(num, label, btn) {
  (navigator.clipboard?.writeText(num) || Promise.reject())
    .catch(() => { const t=document.createElement('textarea');t.value=num;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t); })
    .finally(() => { btn.textContent=`✅ 복사 완료 — ${label}`;btn.classList.add('ok');setTimeout(()=>{btn.textContent='📋 계좌번호 복사';btn.classList.remove('ok');},2500); });
}

document.querySelectorAll('.fb').forEach(b => b.addEventListener('click', () => {
  _filter = b.dataset.f;
  document.querySelectorAll('.fb').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  applyFilter();
}));

function applyFilter() {
  const shown = _filter === 'all' ? _all : _all.filter(i => i.type === _filter);
  render(shown);
}

function showData(data) {
  _all = data.items || [];
  document.getElementById('tsLine1').textContent = '마지막 업데이트: ' + data.updatedAt;
  document.getElementById('tsLine2').textContent = `세아제강 경조사 ${_all.length}건`;
  document.getElementById('n0').textContent = _all.length;
  document.getElementById('n1').textContent = _all.filter(i=>i.type==='funeral').length;
  document.getElementById('n2').textContent = _all.filter(i=>i.type==='wedding').length;
  document.getElementById('n3').textContent = _all.filter(i=>i.type==='birth').length;
  document.getElementById('statsBar').style.display = 'flex';
  applyFilter();
}

let _installPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _installPrompt = e;
  const btn = document.getElementById('btnInstall');
  if (btn) btn.style.display = 'flex';
  if (!sessionStorage.getItem('pwa_dismissed')) {
    const banner = document.getElementById('installBanner');
    if (banner) banner.style.display = 'flex';
  }
});

window.addEventListener('appinstalled', () => {
  _installPrompt = null;
  const btn = document.getElementById('btnInstall');
  if (btn) btn.style.display = 'none';
  const banner = document.getElementById('installBanner');
  if (banner) banner.style.display = 'none';
});

function doInstall() {
  if (!_installPrompt) { alert('설치 준비 중입니다. 페이지를 새로고침 후 다시 시도해주세요.'); return; }
  _installPrompt.prompt();
  _installPrompt.userChoice.then(() => { _installPrompt = null; });
}

function dismissBanner() {
  sessionStorage.setItem('pwa_dismissed', '1');
  const banner = document.getElementById('installBanner');
  if (banner) banner.style.display = 'none';
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(() => {}); });
}

window.addEventListener('DOMContentLoaded', () => {
  if (window.SEAH_DATA) {
    showData(window.SEAH_DATA);
  } else {
    document.getElementById('cardList').innerHTML = `<div class="empty"><div class="ico">📋</div><h3>데이터가 없습니다</h3><p>Claude에서 <strong>"경조사 대시보드 갱신"</strong> 스킬을 실행하면<br>세아제강 경조사 목록과 계좌번호가 자동으로 채워집니다.</p><p style="margin-top:12px;color:#999;font-size:12px">세아웍스에 로그인된 브라우저라면 ↻ 새로고침으로 목록을 볼 수 있습니다.<br>(계좌번호는 스킬 실행 시에만 표시)</p></div>`;
  }
});

async function forceRefresh() {
  try {
    // Service Worker 캐시 전체 삭제
    const keys = await caches.keys();
    await Promise.all(keys.map(k => caches.delete(k)));
    // SW 업데이트 강제
    if ('serviceWorker' in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.update()));
    }
  } catch(e) {}
  location.reload(true);
}
</script>
